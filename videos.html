<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeos</title>
    <style>
        body {
            background-color: #121212;
            color: #fff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .video-container {
            max-width: 800px;
            margin: 0 auto 40px;
        }

        iframe {
            width: 100%;
            height: 450px;
            border: none;
        }
    </style>
</head>
<body>

    <h1>Vídeos</h1>

    <div class="video-container">
        <iframe src="https://www.youtube.com/embed/wXPYENjrvmw" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
    </div>

    <div class="video-container">
        <iframe src="https://www.youtube.com/embed/DiOHhVhMKM4" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
    </div>
<div class="spotify-container" style="max-width:800px; margin:0 auto 40px;">
    <h2>Ouça nossa playlist no Spotify!</h2>
    <iframe src="https://open.spotify.com/embed/playlist/7pJ1prPkLI8gFofkHgI8UE?si=QZGp_485TpS6JkBxghUY9g" 
        width="100%" 
        height="380" 
        frameborder="0" 
        allowtransparency="true" 
        allow="encrypted-media">
    </iframe>
</div>
</body>
</html>
