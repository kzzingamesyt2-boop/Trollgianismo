<!DOCTYPE html><html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vídeos - Trollgianismo</title>  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family: Arial; }

    body {
      background: linear-gradient(145deg, #2b2b2b, #3a3a3a);
      color:#e5e5e5;
    }

    @font-face {
      font-family: 'DropShade';
      src: url('https://files.catbox.moe/bsplgq.ttf');
    }

    header {
      background:#3a3a3a;
      padding:30px;
      text-align:center;
      font-size:28px;
      border-radius:0 0 25px 25px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.5);
    }

    header span {
      font-family: 'DropShade', Arial;
    }

    nav {
      display:flex;
      justify-content:center;
      gap:15px;
      padding:20px;
      flex-wrap:wrap;
    }

    nav a {
      text-decoration:none;
      background: linear-gradient(145deg, #444, #2f2f2f);
      padding:12px 20px;
      border-radius:30px;
      color:#e5e5e5;
      font-weight:bold;
      box-shadow: 4px 4px 12px #1f1f1f, -4px -4px 12px #4a4a4a;
      transition:0.3s;
    }

    nav a:hover {
      transform: scale(1.05);
    }

    .container {
      max-width:1000px;
      margin:auto;
      padding:40px 20px;
      text-align:center;
    }

    .video-card {
      background: linear-gradient(145deg, #3a3a3a, #2b2b2b);
      padding:25px;
      border-radius:25px;
      box-shadow: 10px 10px 25px #1a1a1a, -10px -10px 25px #4a4a4a;
    }

    iframe {
      width:100%;
      height:450px;
      border-radius:15px;
      border:none;
    }

    .fallback {
      margin-top:15px;
    }

    .fallback a {
      display:inline-block;
      margin-top:8px;
      padding:10px 20px;
      border-radius:20px;
      background: linear-gradient(145deg, #444, #2f2f2f);
      color:#e5e5e5;
      text-decoration:none;
      font-weight:bold;
      transition:0.3s;
    }

    .fallback a:hover {
      transform: scale(1.05);
    }

    @media (max-width: 768px) {
      iframe {
        height:250px;
      }
    }
  </style></head>
<body><header>
  <span>TROLLGIANISMO — HISTÓRIA COMPLETA</span>
</header><nav>
  <a href="index.html">Voltar ao Início</a>
</nav><div class="container">
  <div class="video-card">
    <h2 style="margin-bottom:20px;">Todas as Resenhas em Vídeo</h2><div class="video-wrapper">

  <iframe 
    src="https://www.youtube-nocookie.com/embed/DiOHhVhMKM4" 
    title="YouTube video player" 
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
    allowfullscreen>
  </iframe>  <div class="fallback">
    <p>Se o vídeo não carregar:</p>
    <a href="https://youtu.be/DiOHhVhMKM4" target="_blank">Assistir no YouTube</a>
  </div>
</div>  </div>
</div></body>
</html>
