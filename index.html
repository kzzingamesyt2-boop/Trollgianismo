<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0d0d0f;--sur:#141417;--sur2:#1c1c21;--bor:#2a2a32;
      --ac:#7c6af7;--ac2:#5de4c7;--tx:#e8e8f0;--mu:#6b6b80;
      --hdr:58px;--bar:66px;
    }
    html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:'Syne',sans-serif}

    /* SETUP */
    #setup{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--bg);z-index:9}
    .card{background:var(--sur);border:1px solid var(--bor);border-radius:20px;padding:36px 28px;width:100%;max-width:440px}
    .card h1{font-size:1.75rem;font-weight:800;margin-bottom:6px;background:linear-gradient(135deg,var(--tx) 40%,var(--ac));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .card p{color:var(--mu);font-size:.88rem;margin-bottom:24px}
    .card label{display:block;font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--mu);margin-bottom:8px}
    .card input{width:100%;background:var(--sur2);border:1px solid var(--bor);border-radius:12px;padding:13px 16px;color:var(--tx);font-family:'Syne',sans-serif;font-size:1rem;outline:none;margin-bottom:18px;transition:border-color .2s}
    .card input:focus{border-color:var(--ac)}
    #enter-btn{width:100%;padding:14px;background:var(--ac);color:#fff;border:none;border-radius:12px;font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;cursor:pointer}
    #enter-btn:disabled{opacity:.5}
    .errmsg{background:rgba(240,80,80,.1);border:1px solid rgba(240,80,80,.3);color:#f05050;border-radius:10px;padding:11px 14px;margin-bottom:16px;font-size:.82rem;display:none;line-height:1.5;word-break:break-word}

    /* CHAT */
    #chat{display:none;position:fixed;inset:0}
    .hdr{position:absolute;top:0;left:0;right:0;height:var(--hdr);display:flex;align-items:center;justify-content:space-between;padding:0 16px;background:var(--sur);border-bottom:1px solid var(--bor);z-index:2}
    .hdr-l{display:flex;align-items:center;gap:10px}
    .av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--ac),var(--ac2));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.8rem;color:#fff;flex-shrink:0}
    .rname{font-weight:700;font-size:.95rem}
    .dot{width:7px;height:7px;background:var(--ac2);border-radius:50%;box-shadow:0 0 5px var(--ac2);animation:blink 2s infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
    .stxt{font-size:.72rem;color:var(--mu);font-family:'DM Mono',monospace}
    .btn-out{background:none;border:1px solid var(--bor);color:var(--mu);border-radius:8px;padding:6px 12px;font-family:'Syne',sans-serif;font-size:.75rem;cursor:pointer}

    #msgs{position:absolute;top:var(--hdr);bottom:var(--bar);left:0;right:0;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:2px}
    #msgs::-webkit-scrollbar{width:4px}
    #msgs::-webkit-scrollbar-thumb{background:var(--bor);border-radius:4px}

    .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;color:var(--mu);gap:8px;font-size:.88rem;min-height:200px}
    .empty-i{font-size:2rem;opacity:.35}
    .grp{display:flex;flex-direction:column;margin-bottom:6px}
    .grp.me{align-items:flex-end}
    .grp.them{align-items:flex-start}
    .sname{font-size:.7rem;font-weight:600;color:var(--mu);margin-bottom:3px;padding:0 4px}
    .bub{max-width:75%;padding:9px 13px;border-radius:16px;font-size:.9rem;line-height:1.5;word-break:break-word;animation:pop .18s ease}
    @keyframes pop{from{opacity:0;transform:scale(.95) translateY(3px)}to{opacity:1;transform:none}}
    .grp.me .bub{background:var(--ac);color:#fff;border-bottom-right-radius:4px}
    .grp.them .bub{background:var(--sur2);border:1px solid var(--bor);border-bottom-left-radius:4px}
    .ttime{font-size:.62rem;color:var(--mu);font-family:'DM Mono',monospace;margin-top:3px;padding:0 4px}
    .sys{text-align:center;font-size:.7rem;color:var(--mu);margin:6px 0;font-family:'DM Mono',monospace}
    .datesep{display:flex;align-items:center;gap:10px;margin:14px 0;color:var(--mu);font-size:.7rem;font-family:'DM Mono',monospace}
    .datesep::before,.datesep::after{content:'';flex:1;height:1px;background:var(--bor)}

    .bar{position:absolute;bottom:0;left:0;right:0;height:var(--bar);display:flex;align-items:center;gap:10px;padding:0 16px;background:var(--sur);border-top:1px solid var(--bor);z-index:2}
    #inp{flex:1;height:44px;background:var(--sur2);border:1px solid var(--bor);border-radius:12px;padding:0 16px;color:var(--tx);font-family:'Syne',sans-serif;font-size:.92rem;outline:none;transition:border-color .2s}
    #inp:focus{border-color:var(--ac)}
    #inp::placeholder{color:var(--mu)}
    #sbtn{width:44px;height:44px;flex-shrink:0;border-radius:12px;background:var(--ac);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center}
    #sbtn svg{width:17px;height:17px;fill:#fff}
  </style>
</head>
<body>

<div id="setup">
  <div class="card">
    <h1>💬 Chat</h1>
    <p>Digite seu apelido para entrar na sala.</p>
    <div id="errmsg" class="errmsg"></div>
    <label>Seu apelido</label>
    <input id="ninp" type="text" placeholder="ex: João, Anônimo..." maxlength="24"/>
    <button id="enter-btn" onclick="entrar()">Entrar no chat →</button>
  </div>
</div>

<div id="chat">
  <div class="hdr">
    <div class="hdr-l">
      <div class="av" id="av">?</div>
      <div>
        <div class="rname">Sala Geral</div>
        <div style="display:flex;align-items:center;gap:5px;margin-top:2px">
          <div class="dot"></div><span class="stxt">online</span>
        </div>
      </div>
    </div>
    <button class="btn-out" onclick="sair()">Sair</button>
  </div>

  <div id="msgs">
    <div class="empty" id="emptyEl">
      <div class="empty-i">🌐</div>
      <span>Nenhuma mensagem ainda. Diga olá!</span>
    </div>
  </div>

  <div class="bar">
    <input id="inp" type="text" placeholder="Digite uma mensagem..."/>
    <button id="sbtn" onclick="enviar()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
const API = 'https://acfepcqabsfzndgsfdxk.supabase.co/rest/v1/messages';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFjZmVwY3FhYnNmem5kZ3NmZHhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxODgxNDQsImV4cCI6MjA4OTc2NDE0NH0.dTC1nVGS2biX126LiMjpb8sACTTqxUUDegw2EvVC5Do';
const HDR = {'apikey':KEY,'Authorization':'Bearer '+KEY,'Content-Type':'application/json','Prefer':'return=representation'};

let nome='', lastId=0, timer=null;
let ldDate=null, ldSender=null, ldGrp=null;

// GET mensagens
async function getMsgs(gtId){
  const url = gtId > 0 ? API+'?order=id.asc&id=gt.'+gtId : API+'?order=id.asc&limit=200';
  const r = await fetch(url,{headers:HDR});
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}

// POST mensagem
async function postMsg(sender, text){
  const r = await fetch(API,{
    method:'POST', headers:HDR,
    body: JSON.stringify({Sender:sender, Text:text, Ts:new Date().toISOString()})
  });
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}

async function entrar(){
  const n = document.getElementById('ninp').value.trim();
  if(!n){mostrarErro('Insira seu apelido!');return;}
  const btn = document.getElementById('enter-btn');
  btn.disabled=true; btn.textContent='Conectando...';
  nome=n;
  try{
    // Carrega mensagens existentes
    const dados = await getMsgs(0);
    document.getElementById('setup').style.display='none';
    document.getElementById('chat').style.display='block';
    document.getElementById('av').textContent=n[0].toUpperCase();
    if(dados.length>0){
      document.getElementById('emptyEl')?.remove();
      dados.forEach(addMsg);
      lastId=dados[dados.length-1].id;
    }
    // Envia msg de sistema
    try{ await postMsg('🔔 sistema', n+' entrou na sala'); }catch(e){}
    // Inicia polling
    timer=setInterval(poll,2500);
    document.getElementById('inp').focus();
  }catch(e){
    mostrarErro('Erro ao conectar: '+e.message);
    btn.disabled=false; btn.textContent='Entrar no chat →';
  }
}

async function poll(){
  try{
    const dados = await getMsgs(lastId);
    if(dados.length>0){
      document.getElementById('emptyEl')?.remove();
      dados.forEach(addMsg);
      lastId=dados[dados.length-1].id;
    }
  }catch(e){}
}

async function enviar(){
  const inp=document.getElementById('inp');
  const txt=inp.value.trim();
  if(!txt)return;
  inp.value='';
  try{
    const rows = await postMsg(nome, txt);
    if(rows && rows.length>0){
      document.getElementById('emptyEl')?.remove();
      const row=rows[0];
      if(row.id>lastId){ lastId=row.id; addMsg(row); }
    }
  }catch(e){ alert('Erro: '+e.message); }
}

async function sair(){
  clearInterval(timer);
  try{ await postMsg('🔔 sistema', nome+' saiu da sala'); }catch(e){}
  location.reload();
}

function addMsg(d){
  const c=document.getElementById('msgs');
  document.getElementById('emptyEl')?.remove();

  const ts=new Date(d.Ts||d.ts);
  const dStr=ts.toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'});
  const tStr=ts.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});

  if(dStr!==ldDate){
    ldDate=dStr; ldSender=null; ldGrp=null;
    const sep=document.createElement('div');
    sep.className='datesep'; sep.textContent=dStr;
    c.appendChild(sep);
  }

  const sender = d.Sender||d.sender||'';
  if(sender==='🔔 sistema'){
    ldSender=null; ldGrp=null;
    const el=document.createElement('div');
    el.className='sys'; el.textContent=d.Text||d.text||'';
    c.appendChild(el); rolar(); return;
  }

  const isMe=sender===nome;
  if(sender!==ldSender){
    ldSender=sender;
    ldGrp=document.createElement('div');
    ldGrp.className='grp '+(isMe?'me':'them');
    if(!isMe){
      const s=document.createElement('div');
      s.className='sname'; s.textContent=sender;
      ldGrp.appendChild(s);
    }
    c.appendChild(ldGrp);
  }

  const b=document.createElement('div');
  b.className='bub'; b.textContent=d.Text||d.text||'';
  ldGrp.appendChild(b);

  ldGrp.querySelector('.ttime')?.remove();
  const t=document.createElement('div');
  t.className='ttime'; t.textContent=tStr;
  ldGrp.appendChild(t);
  rolar();
}

function rolar(){
  const c=document.getElementById('msgs');
  c.scrollTop=c.scrollHeight;
}

function mostrarErro(msg){
  const el=document.getElementById('errmsg');
  el.textContent=msg; el.style.display='block';
}

// Enter pra enviar
document.addEventListener('keydown',e=>{
  if(e.key==='Enter' && document.getElementById('chat').style.display==='block') enviar();
});
</script>
</body>
</html>
