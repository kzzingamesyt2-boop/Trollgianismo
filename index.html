<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #141417;
      --surface2: #1c1c21;
      --border: #2a2a32;
      --accent: #7c6af7;
      --accent2: #5de4c7;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --bar-h: 70px;
      --hdr-h: 58px;
    }

    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; }

    /* ── SETUP ── */
    #setup {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      background: var(--bg);
      z-index: 10;
    }

    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 36px 28px;
      width: 100%; max-width: 440px;
    }

    .card h1 {
      font-size: 1.8rem; font-weight: 800; margin-bottom: 6px;
      background: linear-gradient(135deg, var(--text) 40%, var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }

    .card p { color: var(--muted); font-size: 0.88rem; margin-bottom: 24px; }

    label { display: block; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }

    .card input {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 12px; padding: 13px 16px; color: var(--text);
      font-family: 'Syne', sans-serif; font-size: 1rem; outline: none;
      margin-bottom: 18px; transition: border-color 0.2s;
    }
    .card input:focus { border-color: var(--accent); }

    .btn-enter {
      width: 100%; padding: 14px; background: var(--accent); color: #fff; border: none;
      border-radius: 12px; font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700;
      cursor: pointer;
    }
    .btn-enter:disabled { opacity: 0.5; }

    .err {
      background: rgba(240,80,80,0.1); border: 1px solid rgba(240,80,80,0.3);
      color: #f05050; border-radius: 10px; padding: 11px 14px;
      margin-bottom: 16px; font-size: 0.82rem; display: none; line-height: 1.5;
    }

    /* ── CHAT ── */
    #chat { display: none; position: fixed; inset: 0; }

    /* Header — fixed top */
    .hdr {
      position: absolute; top: 0; left: 0; right: 0;
      height: var(--hdr-h);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px;
      background: var(--surface); border-bottom: 1px solid var(--border);
      z-index: 2;
    }

    .hdr-left { display: flex; align-items: center; gap: 10px; }

    .avatar {
      width: 34px; height: 34px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 0.8rem; color: #fff; flex-shrink: 0;
    }

    .room-name { font-weight: 700; font-size: 0.95rem; }
    .dot { width: 7px; height: 7px; background: var(--accent2); border-radius: 50%; box-shadow: 0 0 5px var(--accent2); animation: blink 2s infinite; }
    @keyframes blink { 0%,100%{opacity:1}50%{opacity:.3} }
    .status-txt { font-size: 0.72rem; color: var(--muted); font-family: 'DM Mono', monospace; }

    .btn-out {
      background: none; border: 1px solid var(--border); color: var(--muted);
      border-radius: 8px; padding: 6px 12px; font-family: 'Syne', sans-serif; font-size: 0.75rem; cursor: pointer;
    }

    /* Messages — scrollable middle */
    #msgs {
      position: absolute;
      top: var(--hdr-h);
      bottom: var(--bar-h);
      left: 0; right: 0;
      overflow-y: auto;
      padding: 16px;
      display: flex; flex-direction: column; gap: 2px;
    }

    #msgs::-webkit-scrollbar { width: 4px; }
    #msgs::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .empty { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; color: var(--muted); gap: 8px; font-size: 0.88rem; min-height: 200px; }
    .empty-ico { font-size: 2rem; opacity: 0.35; }

    .grp { display: flex; flex-direction: column; margin-bottom: 6px; }
    .grp.me { align-items: flex-end; }
    .grp.them { align-items: flex-start; }
    .sender-name { font-size: 0.7rem; font-weight: 600; color: var(--muted); margin-bottom: 3px; padding: 0 4px; }

    .bubble {
      max-width: 75%; padding: 9px 13px; border-radius: 16px;
      font-size: 0.9rem; line-height: 1.5; word-break: break-word;
      animation: pop .18s ease;
    }
    @keyframes pop { from{opacity:0;transform:scale(.95) translateY(3px)} to{opacity:1;transform:none} }
    .grp.me .bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
    .grp.them .bubble { background: var(--surface2); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .time { font-size: 0.62rem; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 3px; padding: 0 4px; }
    .sys { text-align: center; font-size: 0.7rem; color: var(--muted); margin: 6px 0; font-family: 'DM Mono', monospace; }
    .date-div { display: flex; align-items: center; gap: 10px; margin: 14px 0; color: var(--muted); font-size: 0.7rem; font-family: 'DM Mono', monospace; }
    .date-div::before, .date-div::after { content:''; flex:1; height:1px; background: var(--border); }

    /* Input bar — fixed bottom */
    .bar {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: var(--bar-h);
      display: flex; align-items: center; gap: 10px;
      padding: 0 16px;
      background: var(--surface); border-top: 1px solid var(--border);
      z-index: 2;
    }

    #inp {
      flex: 1;
      height: 44px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 12px; padding: 0 16px;
      color: var(--text); font-family: 'Syne', sans-serif; font-size: 0.92rem;
      outline: none; resize: none; overflow: hidden;
      transition: border-color 0.2s;
      line-height: 44px;
    }
    #inp:focus { border-color: var(--accent); }
    #inp::placeholder { color: var(--muted); }

    #send-btn {
      width: 44px; height: 44px; flex-shrink: 0;
      border-radius: 12px; background: var(--accent); border: none;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    #send-btn svg { width: 17px; height: 17px; fill: #fff; }

    @media (min-width: 860px) {
      #chat, #setup { max-width: 860px; left: 50%; transform: translateX(-50%); }
      #chat { border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
    }
  </style>
</head>
<body>

<div id="setup">
  <div class="card">
    <h1>💬 Chat</h1>
    <p>Digite seu apelido para entrar na sala.</p>
    <div id="err" class="err"></div>
    <label>Seu apelido</label>
    <input id="name-inp" type="text" placeholder="ex: João, Anônimo..." maxlength="24"
      onkeydown="if(event.key==='Enter')entrar()"/>
    <button class="btn-enter" id="enter-btn" onclick="entrar()">Entrar no chat →</button>
  </div>
</div>

<div id="chat">
  <div class="hdr">
    <div class="hdr-left">
      <div class="avatar" id="av">?</div>
      <div>
        <div class="room-name">Sala Geral</div>
        <div style="display:flex;align-items:center;gap:5px;margin-top:2px">
          <div class="dot"></div>
          <span class="status-txt">online</span>
        </div>
      </div>
    </div>
    <button class="btn-out" onclick="sair()">Sair</button>
  </div>

  <div id="msgs">
    <div class="empty" id="empty">
      <div class="empty-ico">🌐</div>
      <span>Nenhuma mensagem ainda. Diga olá!</span>
    </div>
  </div>

  <div class="bar">
    <input type="text" id="inp" placeholder="Digite uma mensagem..."
      onkeydown="if(event.key==='Enter')enviar()"/>
    <button id="send-btn" onclick="enviar()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
  const BASE = 'https://acfepcqabsfzndgsfdxk.supabase.co/rest/v1';
  const KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFjZmVwY3FhYnNmem5kZ3NmZHhrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxODgxNDQsImV4cCI6MjA4OTc2NDE0NH0.dTC1nVGS2biX126LiMjpb8sACTTqxUUDegw2EvVC5Do';
  const H    = { 'apikey': KEY, 'Authorization': 'Bearer ' + KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };

  let meuNome = '', lastId = 0, pollTimer;
  let lastDate = null, lastsender = null, grpEl = null;

  async function req(path, method, body) {
    const r = await fetch(BASE + path, { method: method || 'GET', headers: H, body: body ? JSON.stringify(body) : undefined });
    const t = await r.text();
    if (!r.ok) throw new Error(t);
    return t ? JSON.parse(t) : [];
  }

  async function entrar() {
    const btn = document.getElementById('enter-btn');
    const nome = document.getElementById('name-inp').value.trim();
    if (!nome) { mostrarErro('Insira seu apelido!'); return; }
    btn.disabled = true;
    btn.textContent = 'Conectando...';
    meuNome = nome;

    try {
      const dados = await req('/messages?order=ts.asc&limit=100');
      document.getElementById('setup').style.display = 'none';
      document.getElementById('chat').style.display = 'block';
      document.getElementById('av').textContent = nome[0].toUpperCase();

      if (dados.length > 0) {
        document.getElementById('empty')?.remove();
        dados.forEach(r => addMsg(r));
        lastId = Math.max(...dados.map(r => r.id));
      }

      await req('/messages', 'POST', { sender: '🔔 sistema', text: nome + ' entrou na sala', ts: new Date().toISOString() });
      pollTimer = setInterval(buscarNovas, 2500);
      document.getElementById('inp').focus();

    } catch(e) {
      mostrarErro('Erro: ' + e.message);
      btn.disabled = false;
      btn.textContent = 'Entrar no chat →';
    }
  }

  async function buscarNovas() {
    try {
      const path = lastId === 0
        ? '/messages?order=ts.asc&limit=100'
        : '/messages?order=ts.asc&id=gt.' + lastId;
      const dados = await req(path);
      if (dados.length > 0) {
        document.getElementById('empty')?.remove();
        dados.forEach(r => addMsg(r));
        lastId = Math.max(...dados.map(r => r.id));
      }
    } catch(e) {}
  }

  async function enviar() {
    const inp = document.getElementById('inp');
    const txt = inp.value.trim();
    if (!txt) return;
    inp.value = '';

    try {
      const rows = await req('/messages', 'POST', { sender: meuNome, text: txt, ts: new Date().toISOString() });
      // Força busca de tudo
      lastId = 0;
      await buscarNovas();
    } catch(e) {
      alert('Erro ao enviar: ' + e.message);
    }
  }

  async function sair() {
    clearInterval(pollTimer);
    try { await req('/messages', 'POST', { sender: '🔔 sistema', text: meuNome + ' saiu da sala', ts: new Date().toISOString() }); } catch(e) {}
    location.reload();
  }

  function addMsg(data) {
    const container = document.getElementById('msgs');
    document.getElementById('empty')?.remove();

    const ts = new Date(data.ts);
    const dStr = ts.toLocaleDateString('pt-BR', { day:'2-digit', month:'long', year:'numeric' });
    const tstr = ts.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });

    if (dStr !== lastDate) {
      lastDate = dStr; lastsender = null; grpEl = null;
      const sep = document.createElement('div');
      sep.className = 'date-div'; sep.textContent = dStr;
      container.appendChild(sep);
    }

    if (data.sender === '🔔 sistema') {
      lastsender = null; grpEl = null;
      const el = document.createElement('div');
      el.className = 'sys'; el.textContent = data.text;
      container.appendChild(el); rolar(); return;
    }

    const isMe = data.sender === meuNome;
    if (data.sender !== lastsender) {
      lastsender = data.sender;
      grpEl = document.createElement('div');
      grpEl.className = 'grp ' + (isMe ? 'me' : 'them');
      if (!isMe) {
        const s = document.createElement('div');
        s.className = 'sender-name'; s.textContent = data.sender;
        grpEl.appendChild(s);
      }
      container.appendChild(grpEl);
    }

    const b = document.createElement('div');
    b.className = 'bubble'; b.textContent = data.text;
    grpEl.appendChild(b);

    grpEl.querySelector('.time')?.remove();
    const t = document.createElement('div');
    t.className = 'time'; t.textContent = tstr;
    grpEl.appendChild(t);

    rolar();
  }

  function rolar() {
    const c = document.getElementById('msgs');
    c.scrollTop = c.scrollHeight;
  }

  function mostrarErro(msg) {
    const el = document.getElementById('err');
    el.textContent = msg; el.style.display = 'block';
  }
</script>
</body>
</html>
